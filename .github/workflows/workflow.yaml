name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install build tools
        run: python -m pip install --upgrade build twine

      - name: Clean old build artifacts
        run: rm -rf dist build *.egg-info

      - name: Sync package version
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          VERSION="$(python - <<'PY'
          import os
          from pathlib import Path
          import re

          if os.environ["EVENT_NAME"] == "release":
              tag = os.environ["RELEASE_TAG"]
              match = re.fullmatch(r"v(\d+\.\d+\.\d+)", tag)
              if not match:
                  raise SystemExit(
                      f"Release tag {tag!r} must use the format vX.Y.Z"
                  )
              print(match.group(1))
          else:
              text = Path("pyproject.toml").read_text()
              match = re.search(r'^version = "([^"]+)"$', text, re.M)
              if not match:
                  raise SystemExit("No project version found in pyproject.toml")
              print(match.group(1))
          PY
          )"

          echo "PACKAGE_VERSION=${VERSION}" >> "$GITHUB_ENV"

          python - <<PY
          from pathlib import Path
          import re

          version = "${VERSION}"

          pyproject = Path("pyproject.toml")
          pyproject.write_text(
              re.sub(
                  r'^version = "[^"]+"$',
                  f'version = "{version}"',
                  pyproject.read_text(),
                  count=1,
                  flags=re.M,
              )
          )

          init_py = Path("silco/__init__.py")
          init_py.write_text(
              re.sub(
                  r'^__version__ = "[^"]+"$',
                  f'__version__ = "{version}"',
                  init_py.read_text(),
                  count=1,
                  flags=re.M,
              )
          )
          PY

          echo "Building silco version ${VERSION}"

      - name: Build distributions
        run: python -m build

      - name: Verify distribution version
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          from zipfile import ZipFile

          version = os.environ["PACKAGE_VERSION"]
          wheel = Path(f"dist/silco-{version}-py3-none-any.whl")
          sdist = Path(f"dist/silco-{version}.tar.gz")

          if not wheel.is_file() or not sdist.is_file():
              raise SystemExit(
                  f"Expected silco {version} distributions, found: "
                  + ", ".join(path.name for path in Path("dist").iterdir())
              )

          with ZipFile(wheel) as archive:
              metadata_name = next(
                  name for name in archive.namelist() if name.endswith(".dist-info/METADATA")
              )
              metadata = archive.read(metadata_name).decode()

          if f"Version: {version}\n" not in metadata:
              raise SystemExit(f"Wheel metadata does not contain Version: {version}")
          PY

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/silco

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
